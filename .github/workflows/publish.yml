name: Publish packages

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

env:
  MAJOR_VERSION: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calculate-version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-string.outputs.version }}

    steps:
      - name: Generate version string
        id: version-string
        shell: bash
        run: |
          version="${{ env.MAJOR_VERSION }}.$(date -u '+%Y.%m.%d-%H.%M')-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs:
      - calculate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test --continue --stacktrace -Pversion=${{ needs.calculate-version.outputs.version }}

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6.4.1
        with:
          report_paths: '**/build/test-results/test/*.xml'
          check_name: Test rapport
          annotate_only: true
          detailed_summary: true

      - name: Build
        run: ./gradlew clean assemble --stacktrace -Pversion=${{ needs.calculate-version.outputs.version }}

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' && github.event_name == 'push'
    needs:
      - calculate-version
      - verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish --stacktrace -Pversion="${{ needs.calculate-version.outputs.version }}"
